<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>雾天智能检测系统</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <!-- 引入 ECharts 库 -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.2/dist/echarts.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
      :root {
    --success-color: #28a745;  /* 轻度雾：绿色 */
    --warning-color: #ffc107;  /* 中度雾：黄色 */
    --danger-color: #dc3545;   /* 重度雾：红色 */
  }
    html,body{height:100%;font-family:'Orbitron',sans-serif;background:url('/static/wu.png') no-repeat center center fixed;background-size:cover;color:#ccc}
    .top-nav{position:fixed;top:0;left:0;width:100%;padding:10px 30px;background:rgba(0,0,0,0.8);border-bottom:2px solid #00ffe0;justify-content:space-between;align-items:center;color:#fff;font-size:18px;z-index:1000;display:flex}
    .nav-title{font-weight:bold;letter-spacing:1px;text-shadow:0 0 4px #00ffe0}
    .btn-small{padding:8px 16px;background:#222;border:1px solid #00ffe0;border-radius:4px;color:#eee;cursor:pointer;transition:background .2s}
    .btn-small:hover{background:#00ffe0;color:#000}
    #mainContainer{position:absolute;top:0;left:0;width:100vw;height:100vh;background:url('/static/lizi.gif')no-repeat center center fixed;background-size:cover;padding-top:100px;justify-content:center;align-items:flex-start;overflow:auto;display:flex}
    .panel{width:90%;max-width:900px;background:#1f1f1f;border-radius:12px;overflow:hidden;box-shadow:0 10px 30px rgba(0,255,255,0.2);animation:float 3s ease-in-out infinite;margin:0 auto;display:flex;flex-direction:column}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .panel-header{padding:20px;background:linear-gradient(90deg,#007777,#00ffe0);text-align:center;color:#fff;font-size:24px;text-shadow:0 0 6px rgba(0,0,0,0.5)}
    .panel-content{padding:30px}
    .media-box{display:flex;gap:20px;margin-bottom:30px}
    .img-card{flex:1;background:rgba(255,255,255,0.05);border:2px solid #333;border-radius:8px;padding:10px;text-align:center;transition:box-shadow .2s}
    .img-card:hover{box-shadow:0 0 15px #00ffe0}
    .img-title{margin-bottom:8px;color:#00ffe0;font-weight:bold}
    .media-box img{width:100%;max-height:300px;object-fit:contain;border-radius:4px;display:block}
    .control-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-bottom:20px}
    .control-card{background:rgba(255,255,255,0.05);border:2px solid #333;border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:transform .2s,box-shadow .2s}
    .control-card:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(0,255,255,0.3)}
    .control-card i{font-size:24px;margin-bottom:8px;color:#00ffe0}
    .control-card span{display:block;font-size:14px;color:#ccc;margin-bottom:8px}
    .control-card small{display:block;font-size:12px;color:#888}
    .status-line{height:4px;background:#333;border-radius:2px;overflow:hidden;margin-bottom:10px}
    .status-line .progress{width:0;height:100%;background:#00ffe0;transition:width .4s}
    .status-indicator{text-align:center;color:#ccc;margin-bottom:20px}
     .fog-level {
  font-size: 26px;
  font-weight: bold;
  margin-top: 30px;
  text-align: center;
  padding: 12px 20px;
  border: 2px solid #00ffe0;
  border-radius: 8px;
  background: rgba(0, 0, 0, 0.3);
  text-shadow: 0 0 12px #00ffe0;
  box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
}
.light-fog {
  color: var(--success-color);
  text-shadow: 0 0 10px var(--success-color);
}
.medium-fog {
  color: var(--warning-color);
  text-shadow: 0 0 10px var(--warning-color);
}
.heavy-fog {
  color: var(--danger-color);
  text-shadow: 0 0 10px var(--danger-color);
}
    .status-indicator span{color:#00ffe0;font-weight:bold}
    .stats-flex{display:flex;flex-wrap:wrap;gap:20px;justify-content:space-between;margin-top:20px}
    .stat-card{flex:1 1 200px;background:#1a1a1a;border-radius:10px;padding:20px;text-align:center;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
    .stat-card::before{content:'';position:absolute;top:-2px;left:-2px;right:-2px;bottom:-2px;background:linear-gradient(45deg,#00ffe0,#007777);z-index:-1;border-radius:12px}
    .stat-card:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(0,255,224,0.4)}
    .stat-icon{font-size:28px;margin-bottom:12px;color:#00ffe0}
    .stat-title, .stat-value {
  font-weight: 600;
  color: #00ffff;
  text-shadow: 0 0 8px #00ffff, 0 0 4px #00ffff;
}
    .neon-btn{background:linear-gradient(145deg,#00ffe0,#008080);border:2px solid #00ffe0;color:black;box-shadow:0 0 10px #00ffe0,inset 0 0 20px #00ffe0}
    .pulse-btn{background:#ff4d4d;border:2px solid #ff4d4d;color:#fff;box-shadow:0 0 10px #f55,inset 0 0 20px #f55;animation:pulse-glow 2s infinite}
    @keyframes pulse-glow{0%,100%{box-shadow:0 0 10px #f55,inset 0 0 20px #f55}50%{box-shadow:0 0 20px #faa,inset 0 0 30px #f55}}
    #loading{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;border:8px solid #f3f3f3;border-top:8px solid #00ffe0;border-radius:50%;animation:spin 1s linear infinite;z-index:2000}
    @keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
    /* ECharts 容器样式 */
    #echart-container {
      width: 100%;
      height: 300px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header id="topNav" class="top-nav">
    <div class="nav-title">雾天智能检测系统</div>
    <button class="btn-small" onclick="returnToLogin()">退出登录</button>
  </header>
  <div id="mainContainer">
      <div id="forBackground" ></div>
    <div class="panel">
      <div class="panel-header">图像雾天检测系统</div>
      <div class="panel-content">
        <div class="media-box">
          <div class="img-card"><div class="img-title">原始图像</div><img id="mediaPreviewImg"/></div>
          <div class="img-card"><div class="img-title">去雾效果</div><img id="dehazedImg"/></div>
        </div>
        <div class="control-grid">
          <div class="control-card" onclick="chooseImage()"><i class="fas fa-image"></i><span>选择图片</span><small>上传本地照片</small></div>
          <div class="control-card neon-btn" onclick="startDetection()"><i class="fas fa-play"></i><span>开始检测</span><small>启动流程</small></div>
          <div class="control-card pulse-btn" onclick="stopDetection()"><i class="fas fa-stop"></i><span>停止检测</span><small>终止任务</small></div>
        </div>
        <div class="status-line"><div class="progress" id="progressBar"></div></div>
        <div class="status-indicator">状态：<span id="detectionStatus">未检测</span></div>
        <div id="fogLevel" class="fog-level"></div>
        <div class="stats-flex">
          <div class="stat-card"><i class="fas fa-clock stat-icon"></i><div class="stat-title">处理总时间</div><div class="stat-value" id="totalTime">- ms</div></div>
          <div class="stat-card"><i class="fas fa-cogs stat-icon"></i><div class="stat-title">预处理时间</div><div class="stat-value" id="preprocessTime">- ms</div></div>
          <div class="stat-card"><i class="fas fa-microchip stat-icon"></i><div class="stat-title">推理时间</div><div class="stat-value" id="inferenceTime">- ms</div></div>
          <div class="stat-card"><i class="fas fa-ruler-combined stat-icon"></i><div class="stat-title">图像分辨率</div><div class="stat-value" id="imageResolution">-</div></div>
        </div>
        <!-- ECharts 容器 -->
        <div id="echart-container"></div>
      </div>
    </div>
  </div>
  <input type="file" id="mediaInput" accept="image/*" style="display:none"/>
  <div id="loading"></div>
  <script>
  // 退出登录逻辑调整
  function returnToLogin() {
    if (confirm('确定要退出系统吗？')) {
      window.location.reload(); // 刷新页面替代登录状态切换
    }
  }

  const mediaInput = document.getElementById('mediaInput');
  const mediaPreviewImg = document.getElementById('mediaPreviewImg');
  const dehazedImg = document.getElementById('dehazedImg');
  const progressBar = document.getElementById('progressBar');
  const statusText = document.getElementById('detectionStatus');
  const totalTime = document.getElementById('totalTime');
  const preprocessTime = document.getElementById('preprocessTime');
  const inferenceTime = document.getElementById('inferenceTime');
  const imageResolution = document.getElementById('imageResolution');
  const loadingIndicator = document.getElementById('loading');
  // ECharts 实例
  const echartContainer = document.getElementById('echart-container');
  const myChart = echarts.init(echartContainer);

  let isDetecting = false;

  // 页面加载完成后自动显示主界面
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('topNav').style.display = 'flex';
    document.getElementById('mainContainer').style.display = 'flex';
  });

  mediaInput.onchange = function (e) {
    const file = e.target.files[0];
    if (file) {
      resetUI();
      const mediaURL = URL.createObjectURL(file);
      mediaPreviewImg.onload = () => {
        mediaPreviewImg.style.display = 'block';
        imageResolution.textContent = `${mediaPreviewImg.naturalWidth} × ${mediaPreviewImg.naturalHeight}`;
      };
      mediaPreviewImg.src = mediaURL;
    }
  };

  function chooseImage() {
    mediaInput.click();
  }

  function resetUI() {
    dehazedImg.style.display = 'none';
    progressBar.style.width = '0';
    statusText.textContent = '未检测';
    totalTime.textContent = '- ms';
    preprocessTime.textContent = '- ms';
    inferenceTime.textContent = '- ms';
    document.getElementById('fogLevel').className = 'fog-level';
    document.getElementById('fogLevel').textContent = '';
    // 清空 ECharts 图表
    myChart.clear();
  }

  async function startDetection() {
    if (!mediaInput.files[0]) {
      alert('请先选择一张图片');
      return;
    }

    isDetecting = true;
    progressBar.style.width = '0';
    statusText.textContent = '检测中...';
    loadingIndicator.style.display = 'block';

    const canvas = document.createElement('canvas');
    canvas.width = mediaPreviewImg.naturalWidth;
    canvas.height = mediaPreviewImg.naturalHeight;
    canvas.getContext('2d').drawImage(mediaPreviewImg, 0, 0);

    try {
      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.85));
      const formData = new FormData();
      formData.append('frame', blob, 'frame.jpg');

      const response = await fetch('/process', {
        method: 'POST',
        body: formData
      });

      if (!response.ok) {
        const errorData = await response.json();
        throw new Error(errorData.error || '检测失败');
      }

      const data = await response.json();

      updateDetectionDetails(data);
      updateFogLevel(data.fog_level);
      displayDehazedImage(data.image_path);
      statusText.textContent = '检测完成';
      progressBar.style.width = '100%';
      // 更新 ECharts 图表
      updateEChart(data.object_counts);

    } catch (error) {
      console.error('检测失败:', error);
      statusText.textContent = '检测失败';
      alert('检测失败: ' + error.message);
    } finally {
      loadingIndicator.style.display = 'none';
      isDetecting = false;
    }
  }

  function stopDetection() {
    if (!isDetecting) return;

    isDetecting = false;
    statusText.textContent = '已停止';
    progressBar.style.width = '0';
    loadingIndicator.style.display = 'none';
  }

  function updateDetectionDetails(data) {
    totalTime.textContent = `${data.process_time.toFixed(2)} ms`;
    preprocessTime.textContent = `${data.preprocess_time.toFixed(2)} ms`;
    inferenceTime.textContent = `${data.inference_time.toFixed(2)} ms`;
    imageResolution.textContent = `${data.image_shape[1]} × ${data.image_shape[0]}`;
  }

  function updateFogLevel(fogLevel) {
    const fogLevelElement = document.getElementById('fogLevel');

    // 标准化：将中文等级映射为英文等级
    let level = fogLevel;

    if (fogLevel === '轻度雾') {
      level = 'light';
    } else if (fogLevel === '中度雾') {
      level = 'medium';
    } else if (fogLevel === '重度雾') {
      level = 'heavy';
    }

    if (level === 'light') {
      fogLevelElement.textContent = '雾浓度：轻度';
      fogLevelElement.className = 'fog-level light-fog';
    } else if (level === 'medium') {
      fogLevelElement.textContent = '雾浓度：中度';
      fogLevelElement.className = 'fog-level medium-fog';
    } else if (level === 'heavy') {
      fogLevelElement.textContent = '雾浓度：重度';
      fogLevelElement.className = 'fog-level heavy-fog';
    } else {
      fogLevelElement.textContent = '雾浓度：未知';
      fogLevelElement.className = 'fog-level';
    }
  }

  function displayDehazedImage(path) {
    dehazedImg.src = path;
    dehazedImg.style.display = 'block';
  }

  function updateEChart(objectCounts) {
    const option = {
      xAxis: {
        type: 'category',
        data: Object.keys(objectCounts)
      },
      yAxis: {
        type: 'value'
      },
      series: [{
        data: Object.values(objectCounts),
        type: 'bar'
      }]
    };

    myChart.setOption(option);
  }
</script>
</body>
</html>
